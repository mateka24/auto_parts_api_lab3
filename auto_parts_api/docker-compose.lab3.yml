name: auto_parts_lab3

version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: wp_labs_db_lab3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - wp_labs_postgres_lab3:/var/lib/postgresql/data
    networks:
      - wp_labs_network_lab3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wp_labs_app_lab3
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${APP_PORT}
    ports:
      - "4203:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wp_labs_network_lab3
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 4200"

volumes:
  wp_labs_postgres_lab3:

networks:
  wp_labs_network_lab3:
